apiVersion: tekton.dev/v1beta1
kind: Pipeline
metadata:
  name: ci-cd-pipeline
spec:
  workspaces:
    - name: output

  params:
    - name: repo-url
      type: string
    - name: branch
      type: string
      default: main
    - name: app-name
      type: string
    - name: build-image
      type: string

  tasks:
    - name: cleanup
      taskRef:
        name: cleanup
      workspaces:
        - name: source
          workspace: output

    - name: git-clone
      taskRef:
        name: git-clone
      params:
        - name: url
          value: $(params.repo-url)
        - name: revision
          value: $(params.branch)
      workspaces:
        - name: output
          workspace: output

    - name: lint
      runAfter: [git-clone]
      taskRef:
        name: flake8
      workspaces:
        - name: source
          workspace: output

    - name: test
      runAfter: [lint]
      taskRef:
        name: nose
      workspaces:
        - name: source
          workspace: output

    - name: build
      runAfter: [test]
      taskRef:
        name: buildah
      workspaces:
        - name: source
          workspace: output

    - name: deploy
      runAfter: [build]
      taskRef:
        name: openshift-client
      params:
        - name: ARGS
          value:
            - oc
            - create
            - deployment
            - $(params.app-name)
            - --image=$(params.build-image)
            - --dry-run=client
            - -o
            - yaml
            - "|"
            - oc
            - apply
            - -f
            - -
      workspaces:
        - name: source
          workspace: output